scons.args: &scons
    scons_arg:
      - '--strict'

# ------ component CI ------
component.can:
    kconfig:
      - CONFIG_BSP_USING_CAN=y
      - CONFIG_BSP_USING_CAN0=y

component.cherryusb_cdc:
    kconfig:
      - CONFIG_RT_USING_CHERRYUSB=y
      - CONFIG_RT_CHERRYUSB_DEVICE=y
      - CONFIG_RT_CHERRYUSB_DEVICE_SPEED_FS=y
      - CONFIG_RT_CHERRYUSB_DEVICE_KINETIS_MCX=y
      - CONFIG_RT_CHERRYUSB_DEVICE_CDC_ACM=y
      - CONFIG_RT_CHERRYUSB_DEVICE_TEMPLATE_CDC_ACM=y

component.cherryusb_hid:
    kconfig:
      - CONFIG_RT_USING_CHERRYUSB=y
      - CONFIG_RT_CHERRYUSB_DEVICE=y
      - CONFIG_RT_CHERRYUSB_DEVICE_SPEED_FS=y
      - CONFIG_RT_CHERRYUSB_DEVICE_KINETIS_MCX=y
      - CONFIG_RT_CHERRYUSB_DEVICE_HID=y
      - CONFIG_RT_CHERRYUSB_DEVICE_TEMPLATE_HID_MOUSE=y

# ------ Peripheral CI ------
Peripheral.arduino:
    kconfig:
      - CONFIG_BSP_USING_ARDUINO=y

Peripheral.canfd:
    kconfig:
      - CONFIG_BSP_USING_CAN=y
      - CONFIG_BSP_USING_CAN0=y
      - CONFIG_BSP_USING_CAN1=y
      - CONFIG_RT_USING_CAN=y
      - CONFIG_RT_CAN_USING_HDR=y
      - CONFIG_RT_CAN_USING_CANFD=y
      - CONFIG_RT_CANMSG_BOX_SZ=16
      - CONFIG_RT_CANSND_BOX_NUM=1
      - CONFIG_RT_CANSND_MSG_TIMEOUT=100
      - CONFIG_RT_CAN_NB_TX_FIFO_SIZE=1024

# ------ utest CI ------
utest.pin:
    <<: *scons
    kconfig:
      - CONFIG_RT_USING_UTESTCASES=y
      - CONFIG_RT_CONSOLEBUF_SIZE=256
      - CONFIG_RT_UTEST_PIN=y

